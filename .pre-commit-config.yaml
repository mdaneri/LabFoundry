repos:
  - repo: local
    hooks:
      - id: labfoundry-repo-check
        name: LabFoundry repository checks
        entry: python scripts/check_repo.py
        language: system
        pass_filenames: true
        files: '\.(css|html?|js|json|md|ps1|py|svg|toml|ya?ml)$'
        exclude: '^(labfoundry/app/static/vendor/|third_party/|VCFDT/|vcfDownloadTool/|dist/|build/|test-results/)'
