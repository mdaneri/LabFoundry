<dialog id="vcf-sddc-deploy-modal" class="confirm-modal wide-modal vcf-sddc-wizard-modal" aria-labelledby="vcf-sddc-deploy-title">
  <form class="confirm-modal-panel vcf-sddc-wizard-panel" data-vcf-sddc-deploy-form data-ovas='{{ vcf_sddc_ovas | tojson }}' data-dhcp-assignment='{{ vcf_sddc_dhcp_assignment | tojson }}'>
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <input type="hidden" name="confirmed_tls_fingerprint" data-vcf-sddc-tls-fingerprint>

    <aside class="vcf-sddc-wizard-rail" aria-label="SDDC Manager deployment steps">
      <p class="kicker">VCF Helper</p>
      <h2 id="vcf-sddc-deploy-title">Deploy SDDC Manager</h2>
      <ol class="vcf-sddc-step-list">
        <li><button class="vcf-sddc-step-button active" type="button" data-vcf-sddc-step-nav data-step="source"><span>1</span><strong>vCenter / ESXi</strong><small>Endpoint and OVA</small></button></li>
        <li><button class="vcf-sddc-step-button" type="button" data-vcf-sddc-step-nav data-step="resources" disabled><span>2</span><strong>Resources</strong><small>VM name and placement</small></button></li>
        <li><button class="vcf-sddc-step-button" type="button" data-vcf-sddc-step-nav data-step="address" disabled><span>3</span><strong>Address</strong><small>Hostname and network</small></button></li>
        <li><button class="vcf-sddc-step-button" type="button" data-vcf-sddc-step-nav data-step="properties" disabled><span>4</span><strong>OVF properties</strong><small>Appliance settings</small></button></li>
        <li><button class="vcf-sddc-step-button" type="button" data-vcf-sddc-step-nav data-step="followup" disabled><span>5</span><strong>Post deployment</strong><small>Power, DNS, trust, depot</small></button></li>
      </ol>
    </aside>

    <div class="vcf-sddc-wizard-main">
      <div class="confirm-modal-body vcf-sddc-wizard-body">
        <div class="vcf-sddc-wizard-heading">
          <p class="kicker" data-vcf-sddc-step-kicker>Step 1 of 5</p>
          <h3 data-vcf-sddc-step-title>vCenter / ESXi information</h3>
          <p class="muted" data-vcf-sddc-step-description>Choose the SDDC Manager OVA and the vSphere endpoint used for discovery and import.</p>
        </div>
        <div class="alert error hidden" data-vcf-sddc-errors></div>
        <div class="alert warn hidden" data-vcf-sddc-confirmation></div>

        <section class="vcf-sddc-step-page" data-vcf-sddc-step="source" data-vcf-sddc-step-source>
          <div class="form-grid">
            <label><span class="field-label"><span>SDDC Manager OVA</span><button class="help-icon" type="button" data-help="Selects a validated OVA from the fixed SDDC_MANAGER_VCF offline-depot folder. The source file is never modified.">i</button></span><select name="ova_path" required data-vcf-sddc-ova>{% for ova in vcf_sddc_ovas %}{% if not ova.error %}<option value="{{ ova.path }}">{{ ova.relative_path }}</option>{% endif %}{% endfor %}</select></label>
            <label><span class="field-label"><span>vCenter or ESXi address</span><button class="help-icon" type="button" data-help="vCenter Server or standalone ESXi endpoint used for inventory discovery and OVA import. Include :port only when it is not 443.">i</button></span><input name="address" placeholder="esxi-01.labfoundry.internal or esxi-01:8443" required></label>
            <label><span class="field-label"><span>vSphere username</span><button class="help-icon" type="button" data-help="One-time vCenter or ESXi credential used for inventory and deployment. It is not persisted.">i</button></span><input name="username" autocomplete="username" required></label>
            <label><span class="field-label"><span>vSphere password</span><button class="help-icon" type="button" data-help="One-time vCenter or ESXi password held only for this task.">i</button></span><input name="password" type="password" autocomplete="new-password" required></label>
          </div>
          <label class="vcf-sddc-tls-check hidden" data-vcf-sddc-tls-confirmation>
            <input type="checkbox" data-vcf-sddc-tls-confirm>
            <span>
              <strong>Confirm vSphere TLS fingerprint</strong>
              <small>SHA-256 <code data-vcf-sddc-tls-confirmation-fingerprint></code></small>
            </span>
          </label>
        </section>

        <section class="vcf-sddc-step-page hidden" data-vcf-sddc-step="resources" data-vcf-sddc-destination data-vcf-sddc-step-destination>
          <div class="form-grid">
            <label><span class="field-label"><span>VM name</span><button class="help-icon" type="button" data-help="Name for the new VM. Deployment refuses to replace an existing VM with the same name.">i</button></span><input name="vm_name" required data-vcf-sddc-vm-name></label>
            <label><span class="field-label"><span>Resource pool</span><button class="help-icon" type="button" data-help="Resource pool that owns the imported VM. Standalone ESXi exposes its root resource pool.">i</button></span><select name="resource_pool_id" required></select></label>
            <label><span class="field-label"><span>Datastore</span><button class="help-icon" type="button" data-help="Datastore receiving the VM home and all imported disks. The deployment checks free space before starting the import.">i</button></span><select name="datastore_id" required></select></label>
            <label><span class="field-label"><span>VM folder</span><button class="help-icon" type="button" data-help="Optional vCenter VM inventory folder. Standalone ESXi may leave this empty.">i</button></span><select name="folder_id"><option value="">Default VM folder</option></select></label>
            <label><span class="field-label"><span>Specific host</span><button class="help-icon" type="button" data-help="Optional target ESXi host. Leave empty to let vCenter select a suitable host.">i</button></span><select name="host_id"><option value="">Automatic placement</option></select></label>
            <label><span class="field-label"><span>Disk mode</span><button class="help-icon" type="button" data-help="vSphere disk provisioning mode for imported VMDKs. Thin is space-efficient; thick reserves the disk space during deployment.">i</button></span><select name="disk_provisioning"><option value="thin">Thin provisioned</option><option value="thick">Thick provisioned</option></select></label>
          </div>
          <div class="form-grid" data-vcf-sddc-networks></div>
        </section>

        <section class="vcf-sddc-step-page hidden" data-vcf-sddc-step="address">
          <div class="form-grid" data-vcf-sddc-address-assignment>
            <label><span class="field-label"><span>Assignment mode</span><button class="help-icon" type="button" data-help="Manual keeps the OVA network properties editable. Automatic pre-fills them from a LabFoundry DHCP IP zone and still lets you adjust the selected address.">i</button></span><select data-vcf-sddc-assignment-mode><option value="manual">Manual</option><option value="automatic" {% if not vcf_sddc_dhcp_assignment.available %}disabled{% endif %}>Automatic from DHCP zone</option></select></label>
            <label class="hidden" data-vcf-sddc-dhcp-zone-row><span class="field-label"><span>DHCP zone</span><button class="help-icon" type="button" data-help="IPv4 DHCP IP zone used to derive subnet mask, gateway, DNS domain, and DNS server. The chosen address is outside the DHCP lease range and not already assigned.">i</button></span><select data-vcf-sddc-dhcp-zone>{% for scope in vcf_sddc_dhcp_assignment.scopes %}<option value="{{ scope.id }}">{{ scope.name }} - {{ scope.network }}</option>{% endfor %}</select></label>
            <label class="hidden" data-vcf-sddc-auto-hostname-row><span class="field-label"><span>Hostname</span><button class="help-icon" type="button" data-help="Host label for the SDDC Manager appliance. Defaults to the VM name without the managed domain and updates the OVA Host Name property.">i</button></span><input data-vcf-sddc-auto-hostname></label>
            <label class="hidden" data-vcf-sddc-auto-ip-row><span class="field-label"><span>Suggested IPv4 address</span><button class="help-icon" type="button" data-help="First available static address in the selected zone, outside the DHCP lease scope, gateway, reservations, and existing A records. You can override it before deployment.">i</button></span><input data-vcf-sddc-auto-ip></label>
          </div>
        </section>

        <section class="vcf-sddc-step-page hidden" data-vcf-sddc-step="properties">
          <div class="form-grid" data-vcf-sddc-properties></div>
        </section>

        <section class="vcf-sddc-step-page hidden" data-vcf-sddc-step="followup">
          <div class="form-grid">
            <label class="switch-field"><span class="field-label"><span>Power on after deployment</span><button class="help-icon" type="button" data-help="Powers on the imported VM and waits for VCF API readiness. Disable this to deploy the appliance powered off; certificate trust and depot configuration require power-on.">i</button></span><input class="switch-input" type="checkbox" name="power_on" data-vcf-sddc-power-on checked><span class="switch-track" aria-hidden="true"></span></label>
            <label class="switch-field"><span class="field-label"><span>Add managed DNS record</span><button class="help-icon" type="button" data-help="Creates DNS desired state from the appliance FQDN and OVF IP properties when the FQDN belongs to a managed local zone. This does not require powering on the VM.">i</button></span><input class="switch-input" type="checkbox" name="add_dns"><span class="switch-track" aria-hidden="true"></span></label>
            <label class="switch-field" data-vcf-sddc-post-power-option><span class="field-label"><span>Apply VCF certificate trust</span><button class="help-icon" type="button" data-help="Imports the active LabFoundry root CA after the VCF API is ready. Requires power-on. No snapshot is created for this new VM.">i</button></span><input class="switch-input" type="checkbox" name="apply_trust" data-vcf-sddc-apply-trust><span class="switch-track" aria-hidden="true"></span></label>
            <label class="switch-field" data-vcf-sddc-post-power-option><span class="field-label"><span>Configure local VCF Offline Depot</span><button class="help-icon" type="button" data-help="After API readiness, configures this appliance with LabFoundry's applied depot and monitors metadata sync. Requires power-on. Certificate trust is not enabled implicitly.">i</button></span><input class="switch-input" type="checkbox" name="configure_offline_depot" data-vcf-sddc-configure-depot {% if not vcf_target_depot.available %}disabled{% endif %}><span class="switch-track" aria-hidden="true"></span></label>
            <label class="hidden" data-vcf-sddc-depot-password><span class="field-label"><span>{{ vcf_target_depot.username or 'Depot user' }} password</span><button class="help-icon" type="button" data-help="One-time password for the configured LabFoundry depot HTTP user. It is sent to VCF but never stored by LabFoundry.">i</button></span><input name="depot_password" type="password" autocomplete="new-password"></label>
          </div>
        </section>
      </div>

      <div class="confirm-modal-actions vcf-sddc-wizard-actions">
        <button class="button ghost" type="button" data-vcf-sddc-close>Close</button>
        <button class="button secondary hidden" type="button" data-vcf-sddc-back>Back</button>
        <button class="button primary" type="button" data-vcf-sddc-next>Next</button>
        <button class="button primary hidden" type="submit" data-vcf-sddc-submit>Deploy and monitor</button>
      </div>
    </div>
  </form>
</dialog>
