<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LabFoundry - Certificate Request Portal</title>
    <meta name="theme-color" content="#1f4f7a">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/brand/labfoundry-mark.svg">
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">
    <link rel="icon" href="/static/brand/labfoundry-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/app.css?v=request-portal-20260704-1">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          {% include "partials/brand_mark.html" %}
          <span>
            <strong>Certificate Request Portal</strong>
            <small>LabFoundry Certificate Authority</small>
          </span>
        </div>
        <h1>Sign in to request certificates</h1>
        <p class="muted">Use a certificate operator account to submit certificate requests and manage request revocation.</p>
        {% if error %}
          <div class="alert error">{{ error }}</div>
        {% endif %}
        <form class="form-stack" action="/requests/login" method="post">
          <input type="hidden" name="csrf" value="{{ csrf_token }}">
          <input type="hidden" name="next" value="{{ return_to or '/requests' }}">
          <label>
            <span>Username</span>
            <input name="username" autocomplete="username" required autofocus>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="button primary" type="submit">Sign in</button>
        </form>
        <p><a class="text-link" href="/ca">Back to trust material</a></p>
      </section>
    </main>
    <script src="/static/pwa.js?v=pwa-20260627-1"></script>
  </body>
</html>
