name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit used to validate the expected patch version
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-policy:
    name: Version policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check out pull request base
        if: github.event_name != 'push'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha || inputs.base_sha }}
          path: .version-base
      - name: Validate pull request patch version
        if: github.event_name != 'push'
        run: python scripts/version.py check --root . --base-root .version-base
      - name: Validate main version consistency
        if: github.event_name == 'push'
        run: python scripts/version.py check --root .

  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/check_repo.py

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
