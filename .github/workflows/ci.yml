name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-policy:
    name: Version policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out pull request base
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .version-base
      - name: Validate pull request patch version
        if: github.event_name == 'pull_request'
        run: python scripts/version.py check --root . --base-root .version-base
      - name: Validate main version consistency
        if: github.event_name == 'push'
        run: python scripts/version.py check --root .

  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/check_repo.py

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
