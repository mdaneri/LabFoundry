name: Version bump

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bump:
    name: Bump patch version
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted base automation
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: target
          fetch-depth: 0
      - name: Calculate and apply expected patch version
        run: python trusted/scripts/version.py bump --root target --base-root trusted
      - name: Detect version changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git -C target status --porcelain -- pyproject.toml labfoundry/__init__.py clients/powershell/LabFoundry/LabFoundry.psd1)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit patch version
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          version="$(sed -n 's/^version = "\([0-9][0-9.]*\)"$/\1/p' target/pyproject.toml | head -n 1)"
          git -C target config user.name "github-actions[bot]"
          git -C target config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C target add pyproject.toml labfoundry/__init__.py clients/powershell/LabFoundry/LabFoundry.psd1
          git -C target commit -m "chore: bump version to ${version}"
          git -C target push origin "HEAD:${HEAD_REF}"
